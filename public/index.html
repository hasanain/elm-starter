<!DOCTYPE html>
<html>
<head>
    <title>Elm starter application</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .tile {
          border: 1px black solid;
          margin-left: -1px;
          margin-top: -1px;
          text-align: center;
          vertical-align: middle;
          line-height: 100px;
          font-size: 50px;
        }
        .h2 {
          grid-column: span 3;
          font-size: 25px;
          justify-self: center;
        }
        #game {
          grid-area: game;
          margin-left: 1px;
          margin-top: 1px;
          display: grid;
          grid-gap: 5px;
          justify-self: center;
          grid-template-columns: repeat(3, 100px);
          grid-template-rows: 1fr repeat(3, 100px);
        }
        .container {
          width: 100%;
          display: grid;
          grid-gap: 10px;
          grid-template-columns: 1fr 1fr 1fr;
          grid-template-rows: 100px 400px;
          grid-template-areas:
            ". button ."
            ". game .";
        }
        #new-game {
          font-size: 50px;
          grid-area: button;
        }
    </style>
</head>
<body id="main">
    <script src="elm.js"></script>
    <script>
      var app = Elm.Main.fullscreen();
    </script>
</body>
</html>
